version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: qkd_postgres
    environment:
      POSTGRES_DB: qkd_db
      POSTGRES_USER: qkd_user
      POSTGRES_PASSWORD: qkd_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - qkd_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qkd_backend
    environment:
      DATABASE_URL: postgresql://qkd_user:qkd_password@postgres:5432/qkd_db
      SECRET_KEY: your-secret-key-here-change-this-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - qkd_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qkd_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - qkd_network
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000

volumes:
  postgres_data:

networks:
  qkd_network:
    driver: bridge
